{% extends 'base.html' %}

{% load static %}

{% block body_block %}

   <!--********************************
			Start Main Content
	  ******************************** -->
        <!-- Hero Area -->
         {% for i in hero_area %}
        <section class="vs-hero vs-hero-style2" data-wow-delay="0.25s" aria-hidden="true">
            <div class="vs-hero__item2 style2" data-bg-src="{% static 'assets/img/bg/hero-bg-3.jpg' %}">
              <div class="container">
                  <div class="row justify-content-start align-items-center">
                      <div class="col-lg-7 position-relative">
                          <div class="vs-hero__content">
                              <div class="vs-hero__subtitle wow animate__fadeInUp" data-wow-delay="0.60s"><span class="icon"><img src=" {{ i.icon_img.url }}"width="80" height="80"  alt="Hero Icon"></span>{{i.icon_title}} </div>
                              <h1 class="vs-hero__title wow animate__fadeInUp" data-wow-delay="0.70s">{{ i.title }}</h1>
                              <p class="vs-hero__text wow animate__fadeInUp" data-wow-delay="0.80s">{{i.note}}</p>
                              <div class="hero-btn wow animate__fadeInUp" data-wow-delay="0.90s">
                                  <a class="vs-btn2" href="index.html">Get Pricing<i class="far fa-long-arrow-right"></i></a>
                                  <a href="{{i.video.urls}}" class="play-btn popup-video">
                                      <i class="fas fa-play"></i>
                                  </a>
                              </div>
                          </div>  
                          <span class="shape-mockup hero-shep2 moving d-none d-xl-block" style="left: -120px; bottom: -40%;"><img src="{% static 'assets/img/shapes/clean1.png' %}" alt="hero element"></span>
                      </div>
                  </div>
                  <span class="shape-mockup hero-shep5 spin d-none d-md-block" style="right: 20%; top: 90px;"><img src="{% static 'assets/img/shapes/circle-1.png' %}" alt="hero element"></span>
              </div>
            </div>
            <div class="bubbles">
              <div class="bubble"></div>
              <div class="bubble"></div>
              <div class="bubble"></div>
              <div class="bubble"></div>
              <div class="bubble"></div>
              <div class="bubble"></div>
              <div class="bubble"></div>
              <div class="bubble"></div>
              <div class="bubble"></div>
              <div class="bubble"></div>
            </div>
          <span class="shape-mockup d-xl-block d-none wow animate__fadeInLeft" style="left: 50px; bottom: 60px;"><img src="{% static 'assets/img/shapes/hero-sheap3.png' %}" alt="Hero element"></span>
          <span class="shape-mockup d-xl-block d-none wow animate__fadeInRight" style="right: 0px; bottom: 0px;"><img src="{% static 'assets/img/shapes/hero-shep4.png' %}" alt="Hero element"></span>
        </section>
        {% endfor %}
        <!-- Hero Area End -->
{% endblock %}
